<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Never Ending Fantasy — 2D</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #111;
      color: #ccc;
      font-family: 'Courier New', monospace;
      display: flex;
      flex-direction: column;
      align-items: center;
      height: 100vh;
      overflow: hidden;
    }
    #hud {
      display: flex;
      gap: 12px;
      padding: 6px 12px;
      background: #1a1a1a;
      width: 100%;
      font-size: 13px;
      z-index: 10;
      align-items: center;
      flex-wrap: wrap;
    }
    #hud .hp-bar {
      display: flex;
      align-items: center;
      gap: 6px;
    }
    #hud .hp-fill {
      width: 120px;
      height: 12px;
      background: #333;
      border: 1px solid #555;
      position: relative;
    }
    #hud .hp-fill-inner {
      height: 100%;
      background: #c22;
      transition: width 0.2s;
    }
    #hud .attack-selector span {
      padding: 2px 6px;
      margin: 0 2px;
      border: 1px solid #444;
      cursor: pointer;
    }
    #hud .attack-selector span.active {
      border-color: #fa0;
      color: #fa0;
    }
    #hud .autoimg {
      display: flex;
      align-items: center;
      gap: 5px;
      cursor: pointer;
      user-select: none;
      color: #aaa;
      white-space: nowrap;
    }
    #hud .autoimg input {
      accent-color: #da6;
      width: 14px;
      height: 14px;
      cursor: pointer;
      margin: 0;
    }
    #autoimg-status {
      font-size: 11px;
      white-space: nowrap;
      color: #9a8;
    }
    #autoimg-status.working { color: #da6; }
    #autoimg-status.paused { color: #e88; }
    #room-selector {
      background: #222;
      color: #ccc;
      border: 1px solid #555;
      padding: 2px 4px;
      font-size: 12px;
      font-family: inherit;
      max-width: 200px;
    }
    #connection-status {
      font-size: 11px;
      padding: 2px 6px;
      border-radius: 3px;
    }
    #connection-status.connected { color: #4a4; }
    #connection-status.disconnected { color: #a44; }
    #combat-log {
      position: fixed;
      bottom: 8px;
      left: 8px;
      font-size: 11px;
      color: #888;
      max-height: 100px;
      overflow: hidden;
      z-index: 5;
    }
    #objective-display {
      display: none;
      position: fixed;
      top: 40px;
      right: 12px;
      font-size: 12px;
      color: #da6;
      background: rgba(0,0,0,0.7);
      padding: 6px 10px;
      border: 1px solid #553;
      border-radius: 4px;
      z-index: 10;
      max-width: 300px;
    }
    #dialogue-panel {
      display: none;
      position: fixed;
      bottom: 40px;
      left: 50%;
      transform: translateX(-50%);
      width: 600px;
      max-width: 90%;
      background: rgba(10, 10, 15, 0.92);
      border: 1px solid #554;
      border-radius: 6px;
      padding: 14px 18px;
      z-index: 20;
    }
    #dialogue-speaker {
      color: #da6;
      font-size: 14px;
      font-weight: bold;
      margin-bottom: 6px;
    }
    #dialogue-text {
      color: #ccc;
      font-size: 13px;
      line-height: 1.4;
      min-height: 40px;
    }
    #dialogue-choices {
      margin-top: 10px;
      display: flex;
      flex-direction: column;
      gap: 4px;
    }
    .dialogue-choice {
      color: #8af;
      cursor: pointer;
      padding: 3px 0;
      font-size: 13px;
    }
    .dialogue-choice:hover {
      color: #bdf;
    }
    canvas {
      flex: 1;
      cursor: crosshair;
    }
    /* Fundido corto al entrar en una escena nueva por un borde: main.ts añade
       .show (opaco sin transición) y lo quita al frame siguiente → fade-out. */
    #scene-fade {
      position: fixed;
      inset: 0;
      background: #08060e;
      opacity: 0;
      pointer-events: none;
      transition: opacity 300ms ease-out;
      z-index: 45;
    }
    #scene-fade.show { opacity: 1; transition: none; }
    #narrative-loader {
      position: fixed;
      inset: 0;
      display: none;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 14px;
      background: rgba(8, 8, 12, 0.78);
      z-index: 40;
      color: #d8c79a;
      font-size: 14px;
      text-align: center;
      padding: 24px;
    }
    #narrative-loader.visible { display: flex; }
    #narrative-loader.error { color: #e88; }
    #narrative-loader .spinner {
      width: 36px;
      height: 36px;
      border: 3px solid #443;
      border-top-color: #d8c79a;
      border-radius: 50%;
      animation: nl-spin 1s linear infinite;
    }
    #narrative-loader.error .spinner {
      animation: none;
      border-top-color: currentColor;
    }
    #narrative-loader .title { font-size: 16px; letter-spacing: 0.5px; }
    #narrative-loader .detail { color: #998; max-width: 480px; line-height: 1.4; }
    #narrative-loader .elapsed { color: #776; font-size: 12px; }
    #narrative-loader .dismiss {
      display: none;
      margin-top: 6px;
      padding: 6px 14px;
      background: #2a2a30;
      color: #d8c79a;
      border: 1px solid #554;
      border-radius: 4px;
      cursor: pointer;
      font-family: inherit;
      font-size: 12px;
    }
    #narrative-loader.error .dismiss { display: inline-block; }
    @keyframes nl-spin { to { transform: rotate(360deg); } }
    #travel-panel {
      display: none;
      position: fixed;
      bottom: 8px;
      left: 8px;
      background: rgba(10, 10, 15, 0.85);
      border: 1px solid #454;
      border-radius: 4px;
      padding: 6px 8px;
      z-index: 15;
      max-width: 220px;
    }
    #travel-panel .travel-title {
      color: #9a9;
      font-size: 11px;
      margin-bottom: 4px;
      letter-spacing: 0.5px;
    }
    #travel-panel .travel-exit {
      display: block;
      width: 100%;
      text-align: left;
      background: #1e2420;
      color: #8db;
      border: 1px solid #354;
      border-radius: 3px;
      padding: 4px 6px;
      margin-top: 3px;
      font-family: inherit;
      font-size: 12px;
      cursor: pointer;
    }
    #travel-panel .travel-exit:hover {
      background: #283430;
      color: #adf;
    }
    /* Salidas del lado que el jugador está empujando (caso ambiguo). */
    #travel-panel .travel-exit--highlight {
      border-color: #cb8;
      background: #2c2a1e;
      color: #edb;
    }
    #interact-prompt {
      display: none;
      position: fixed;
      bottom: 120px;
      left: 50%;
      transform: translateX(-50%);
      background: rgba(10, 10, 15, 0.85);
      border: 1px solid #564;
      border-radius: 4px;
      padding: 5px 12px;
      z-index: 15;
      color: #da6;
      font-size: 13px;
    }
    #error-log {
      position: fixed;
      top: 40px;
      right: 12px;
      width: 320px;
      max-height: calc(100vh - 60px);
      overflow-y: auto;
      background: rgba(15, 8, 8, 0.92);
      border: 1px solid #633;
      border-radius: 4px;
      padding: 6px 8px;
      z-index: 50;
      font-size: 11px;
      line-height: 1.4;
      color: #cba;
    }
    #error-log .error-log__header {
      color: #e88;
      font-weight: bold;
      letter-spacing: 0.5px;
      margin-bottom: 6px;
      border-bottom: 1px solid #533;
      padding-bottom: 3px;
    }
    #error-log .error-log__empty {
      color: #666;
      font-style: italic;
      font-size: 10px;
    }
    #error-log .error-log__entry {
      border-top: 1px solid #2a1a1a;
      padding: 4px 0;
    }
    #error-log .error-log__entry:first-child { border-top: none; }
    #error-log .error-log__meta {
      display: flex;
      justify-content: space-between;
      font-size: 10px;
    }
    #error-log .error-log__source { font-weight: bold; }
    #error-log .error-log__time { color: #777; }
    #error-log .error-log__msg { color: #f0c8a8; margin-top: 2px; }
    #error-log .error-log__detail {
      white-space: pre-wrap;
      word-break: break-all;
      color: #a88;
      font-size: 10px;
      margin-top: 3px;
      max-height: 90px;
      overflow-y: auto;
    }
  </style>
</head>
<body>
  <div id="hud">
    <select id="room-selector">
      <option value="">-- Room --</option>
    </select>
    <span id="connection-status" class="disconnected">Local</span>
    <div class="hp-bar">
      <span>Player</span>
      <div class="hp-fill"><div class="hp-fill-inner" id="player-hp" style="width:100%"></div></div>
      <span id="player-hp-text">100</span>
    </div>
    <div id="enemy-bars"></div>
    <div class="attack-selector">
      <span data-type="quick" class="active">1:Quick</span>
      <span data-type="heavy">2:Heavy</span>
      <span data-type="medium">3:Medium</span>
      <span data-type="defensive">4:Def</span>
      <span data-type="precise">5:Precise</span>
    </div>
    <label class="autoimg" title="Modo dev: las APIs de IA de pago (Meshy/fal) devuelven su última respuesta cacheada — 0 créditos por llamada">
      <input type="checkbox" id="devcache-toggle"><span>Dev-cache</span>
    </label>
    <span id="autoimg-status"></span>
  </div>
  <canvas id="game"></canvas>
  <div id="combat-log"></div>
  <div id="objective-display"></div>
  <div id="travel-panel"></div>
  <div id="interact-prompt"></div>
  <div id="error-log"></div>
  <div id="dialogue-panel">
    <div id="dialogue-speaker"></div>
    <div id="dialogue-text"></div>
    <div id="dialogue-choices"></div>
  </div>
  <div id="scene-fade"></div>
  <div id="narrative-loader" role="status" aria-live="polite">
    <div class="spinner"></div>
    <div class="title" id="narrative-loader-title">Generando escena...</div>
    <div class="detail" id="narrative-loader-detail">El motor narrativo está construyendo el mundo. Puede tardar un momento.</div>
    <div class="elapsed" id="narrative-loader-elapsed"></div>
    <button class="dismiss" id="narrative-loader-dismiss" type="button">Cerrar</button>
  </div>
  <script type="module" src="/src/main.ts"></script>
</body>
</html>
