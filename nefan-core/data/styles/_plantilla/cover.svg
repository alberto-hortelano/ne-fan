<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024" font-family="sans-serif">
  <!-- Plantilla esquemática: la "cover" es la portada del estilo en la pantalla
       de título. Composición LIBRE: no la consume ningún pipeline de IA, solo
       la UI. Si falta, el builder copia el primer entorno disponible. -->
  <rect width="1024" height="1024" fill="#2c3a4f"/>

  <!-- viñeta libre y representativa del estilo: paisaje + figura -->
  <circle cx="760" cy="220" r="90" fill="#e8dfae"/>
  <path d="M 0 640 L 260 420 L 470 600 L 700 380 L 1024 620 L 1024 1024 L 0 1024 Z"
        fill="#3d5a2c"/>
  <path d="M 0 760 L 320 600 L 640 740 L 1024 640 L 1024 1024 L 0 1024 Z"
        fill="#547233"/>
  <!-- torre en el horizonte -->
  <rect x="640" y="430" width="60" height="180" fill="#8a857a" stroke="#5f5b52" stroke-width="5"/>
  <polygon points="630,430 710,430 670,360" fill="#a4573b"/>
  <!-- figura pequeña de espaldas -->
  <circle cx="300" cy="770" r="24" fill="#c9a281"/>
  <path d="M 276 794 L 324 794 L 316 880 L 284 880 Z" fill="#6a3d7a"/>

  <!-- etiquetas de la plantilla -->
  <g fill="#ffffff" stroke="#00000099" stroke-width="5" paint-order="stroke"
     font-size="34" font-weight="bold">
    <text x="80" y="200">composición libre:</text>
    <text x="80" y="245">lo que mejor venda el estilo</text>
  </g>

  <!-- franja de reglas (solo en la plantilla) -->
  <rect y="874" width="1024" height="150" fill="#1e1e1e" opacity="0.88"/>
  <g fill="#ffffff">
    <text x="32" y="918" font-size="26" font-weight="bold">COVER — portada del estilo (solo UI de la pantalla de título)</text>
    <text x="32" y="958" font-size="22">Composición libre, no alimenta a la IA · si falta, se copia el primer entorno</text>
    <text x="32" y="996" font-size="22" fill="#ffd27a">Evitar texto también aquí: la UI ya superpone el nombre del estilo.</text>
  </g>
</svg>
