<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024" font-family="sans-serif">
  <!-- Plantilla esquemática: qué debe mostrar la referencia "farmland".
       ZONA de mundo abierto: campiña de labor con transición a pradera y bosque.
       La imagen real es una pintura full-bleed sin texto. -->
  <rect width="1024" height="1024" fill="#7da34c"/>

  <!-- campos labrados con surcos -->
  <g>
    <rect x="60" y="80" width="360" height="240" fill="#8f7a52"/>
    <g stroke="#75603a" stroke-width="8">
      <line x1="75" y1="120" x2="405" y2="120"/><line x1="75" y1="160" x2="405" y2="160"/>
      <line x1="75" y1="200" x2="405" y2="200"/><line x1="75" y1="240" x2="405" y2="240"/>
      <line x1="75" y1="280" x2="405" y2="280"/>
    </g>
    <rect x="60" y="420" width="300" height="220" fill="#9c8557"/>
    <g stroke="#7d6a42" stroke-width="8">
      <line x1="100" y1="435" x2="100" y2="625"/><line x1="150" y1="435" x2="150" y2="625"/>
      <line x1="200" y1="435" x2="200" y2="625"/><line x1="250" y1="435" x2="250" y2="625"/>
      <line x1="300" y1="435" x2="300" y2="625"/>
    </g>
    <rect x="620" y="520" width="320" height="230" fill="#a3b35c"/>
    <g stroke="#87984a" stroke-width="8">
      <line x1="635" y1="560" x2="925" y2="560"/><line x1="635" y1="605" x2="925" y2="605"/>
      <line x1="635" y1="650" x2="925" y2="650"/><line x1="635" y1="695" x2="925" y2="695"/>
    </g>
  </g>

  <!-- camino de TIERRA -->
  <path d="M 460 -20 L 540 -20 L 520 500 L 610 1044 L 520 1044 L 440 500 Z" fill="#8f7a52"/>

  <!-- granja y granero: tejado + CARA SUR con puerta (cenital con caras) -->
  <g stroke="#5c3a26" stroke-width="5">
    <g>
      <rect x="620" y="130" width="180" height="50" fill="#c26a48"/>
      <rect x="620" y="180" width="180" height="46" fill="#a4573b"/>
      <rect x="620" y="226" width="180" height="46" fill="#7c4a30"/>
      <rect x="692" y="238" width="34" height="34" fill="#4a3320" stroke-width="3"/>
    </g>
    <g>
      <rect x="650" y="310" width="130" height="42" fill="#a06c3e"/>
      <rect x="650" y="352" width="130" height="38" fill="#8a5c34"/>
      <rect x="650" y="390" width="130" height="38" fill="#68472a"/>
      <rect x="698" y="398" width="34" height="30" fill="#4a3320" stroke-width="3"/>
    </g>
  </g>

  <!-- setos y vallas entre parcelas -->
  <g fill="#46682f">
    <rect x="60" y="340" width="360" height="24" rx="12"/>
    <rect x="440" y="700" width="24" height="240" rx="12"/>
  </g>
  <g stroke="#6e5836" stroke-width="6" fill="none">
    <path d="M 620 460 L 940 460"/>
    <path d="M 60 660 L 360 660"/>
  </g>

  <!-- transición: borde de bosque arriba-derecha (copa + tronco al sur) -->
  <g>
    <rect x="893" y="100" width="14" height="38" fill="#5c3a26"/>
    <rect x="973" y="182" width="14" height="38" fill="#5c3a26"/>
    <g fill="#3d5a2c" stroke="#2c421f" stroke-width="5">
      <circle cx="900" cy="60" r="58"/><circle cx="980" cy="140" r="60"/>
      <circle cx="850" cy="-10" r="50"/><circle cx="1000" cy="30" r="52"/>
    </g>
  </g>
  <!-- transición: pradera silvestre abajo-izquierda -->
  <g fill="#94b45e">
    <ellipse cx="150" cy="800" rx="180" ry="90"/>
  </g>
  <g fill="#d9c86a">
    <circle cx="110" cy="780" r="7"/><circle cx="180" cy="820" r="7"/>
    <circle cx="230" cy="770" r="7"/><circle cx="90" cy="840" r="7"/>
  </g>

  <!-- etiquetas de la plantilla -->
  <g fill="#ffffff" stroke="#00000099" stroke-width="5" paint-order="stroke"
     font-size="32" font-weight="bold">
    <text x="100" y="60">campos labrados (surcos)</text>
    <text x="620" y="130">granja y granero</text>
    <text x="330" y="530">camino de TIERRA</text>
    <text x="90" y="390" font-size="26">seto entre parcelas</text>
    <text x="640" y="500" font-size="26">valla</text>
    <text x="60" y="740">transición a pradera</text>
    <text x="620" y="60" font-size="28">bosque al borde</text>
  </g>

  <!-- franja de reglas (solo en la plantilla) -->
  <rect y="874" width="1024" height="150" fill="#1e1e1e" opacity="0.88"/>
  <g fill="#ffffff">
    <text x="32" y="918" font-size="26" font-weight="bold">REFERENCIA «farmland» — campiña de labor</text>
    <text x="32" y="958" font-size="22">Cenital CON CARAS: granja con cara sur · campos, setos, camino de tierra · con transiciones</text>
    <text x="32" y="996" font-size="22" fill="#ffd27a">Escena completa full-bleed, varios elementos — nunca un sujeto aislado. Sin texto ni UI.</text>
  </g>
</svg>
