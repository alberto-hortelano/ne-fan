<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024" font-family="sans-serif">
  <!-- Plantilla esquemática: "character_noble" como MODEL SHEET —
       el MISMO personaje dibujado tres veces: frente, tres cuartos y espalda.
       Fondo neutro liso; las etiquetas son solo de la plantilla. -->
  <rect width="1024" height="1024" fill="#d8d2c4"/>

  <!-- guías de encuadre -->
  <g stroke="#b04a3a" stroke-width="3" stroke-dasharray="12 10" fill="none">
    <line x1="80" y1="256" x2="944" y2="256"/>
    <line x1="80" y1="724" x2="944" y2="724"/>
  </g>

  <!-- ======== VISTA FRONTAL (cx=190) ======== -->
  <g stroke="#3a2a4a" stroke-width="5">
    <ellipse cx="190" cy="712" rx="92" ry="16" fill="#00000022" stroke="none"/>
    <path d="M 146 372 L 234 372 L 268 700 L 112 700 Z" fill="#8a55a0"/>
    <path d="M 112 700 L 268 700" stroke="#d6a534" stroke-width="10" fill="none"/>
    <path d="M 162 378 L 148 694 M 218 378 L 232 694" stroke="#d6a534" stroke-width="6" fill="none"/>
    <path d="M 146 386 L 116 520 L 136 530 L 160 400 Z" fill="#6a3d7a"/>
    <path d="M 234 386 L 264 520 L 244 530 L 220 400 Z" fill="#6a3d7a"/>
    <circle cx="126" cy="544" r="12" fill="#c9a281"/>
    <circle cx="254" cy="544" r="12" fill="#c9a281"/>
    <circle cx="190" cy="322" r="38" fill="#c9a281"/>
  </g>
  <g fill="#d6a534" stroke="#a87c1e" stroke-width="3">
    <path d="M 154 306 A 40 40 0 0 1 226 306 L 226 292 L 154 292 Z"/>
    <circle cx="190" cy="286" r="8"/>
    <circle cx="190" cy="378" r="9"/>
  </g>
  <g fill="#3a2a4a">
    <circle cx="178" cy="320" r="4"/><circle cx="202" cy="320" r="4"/>
  </g>

  <!-- ======== VISTA TRES CUARTOS (cx=512) ======== -->
  <g stroke="#3a2a4a" stroke-width="5">
    <ellipse cx="512" cy="712" rx="92" ry="16" fill="#00000022" stroke="none"/>
    <!-- media capa visible detrás -->
    <path d="M 468 380 L 452 690 L 492 696 L 500 420 Z" fill="#40265c"/>
    <path d="M 470 372 L 556 372 L 592 700 L 436 700 Z" fill="#8a55a0"/>
    <path d="M 436 700 L 592 700" stroke="#d6a534" stroke-width="10" fill="none"/>
    <path d="M 490 378 L 474 694" stroke="#d6a534" stroke-width="6" fill="none"/>
    <path d="M 556 386 L 586 520 L 566 530 L 542 400 Z" fill="#6a3d7a"/>
    <!-- brazo derecho por delante, con anillo -->
    <path d="M 470 386 L 462 480 L 512 508 L 522 486 L 486 458 Z" fill="#7a4890"/>
    <circle cx="576" cy="544" r="12" fill="#c9a281"/>
    <circle cx="518" cy="498" r="12" fill="#c9a281"/>
    <circle cx="522" cy="492" r="6" fill="#d6a534" stroke="#a87c1e" stroke-width="2"/>
    <circle cx="512" cy="322" r="38" fill="#c9a281"/>
  </g>
  <g fill="#d6a534" stroke="#a87c1e" stroke-width="3">
    <path d="M 476 306 A 40 40 0 0 1 548 306 L 548 292 L 476 292 Z"/>
    <circle cx="518" cy="286" r="8"/>
    <circle cx="516" cy="378" r="9"/>
  </g>
  <g fill="#3a2a4a">
    <circle cx="520" cy="320" r="4"/><circle cx="536" cy="318" r="4"/>
    <path d="M 546 328 l 6 4" stroke="#3a2a4a" stroke-width="3"/>
  </g>

  <!-- ======== VISTA DE ESPALDA (cx=834) ======== -->
  <g stroke="#3a2a4a" stroke-width="5">
    <ellipse cx="834" cy="712" rx="92" ry="16" fill="#00000022" stroke="none"/>
    <!-- la capa cubre toda la espalda -->
    <path d="M 790 372 L 878 372 L 916 700 L 752 700 Z" fill="#40265c"/>
    <path d="M 800 380 Q 834 420 868 380" stroke="#d6a534" stroke-width="6" fill="none"/>
    <path d="M 752 700 L 916 700" stroke="#2c1a40" stroke-width="10" fill="none"/>
    <circle cx="834" cy="322" r="38" fill="#c9a281"/>
    <!-- melena vista desde atrás, sin cara -->
    <path d="M 796 322 A 38 38 0 0 1 872 322 L 872 296 L 796 296 Z" fill="#5c4630"/>
    <path d="M 800 348 Q 834 386 868 348 L 868 320 L 800 320 Z" fill="#5c4630"/>
  </g>
  <g fill="#d6a534" stroke="#a87c1e" stroke-width="3">
    <path d="M 798 302 A 40 40 0 0 1 870 302 L 870 290 L 798 290 Z"/>
    <circle cx="834" cy="386" r="7"/>
  </g>

  <!-- etiquetas de la plantilla -->
  <g fill="#333333" font-size="28" font-weight="bold" text-anchor="middle">
    <text x="190" y="775">frente</text>
    <text x="512" y="775">tres cuartos</text>
    <text x="834" y="775">espalda (capa completa)</text>
  </g>
  <g fill="#333333" font-size="26" font-weight="bold">
    <text x="80" y="230">MISMO personaje, misma altura en las tres vistas</text>
    <text x="80" y="830">telas ricas, ribetes dorados y joyas visibles · fondo neutro liso</text>
  </g>

  <!-- franja de reglas (solo en la plantilla) -->
  <rect y="874" width="1024" height="150" fill="#1e1e1e" opacity="0.88"/>
  <g fill="#ffffff">
    <text x="32" y="918" font-size="26" font-weight="bold">REFERENCIA «character_noble» — model sheet del noble</text>
    <text x="32" y="958" font-size="22">UN personaje, 3 vistas (frente · 3/4 · espalda) · cuerpo entero · fondo neutro liso</text>
    <text x="32" y="996" font-size="22" fill="#ffd27a">La imagen real NO lleva texto ni UI — las etiquetas son solo de la plantilla.</text>
  </g>
</svg>
