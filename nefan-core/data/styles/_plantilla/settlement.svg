<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024" font-family="sans-serif">
  <!-- Plantilla esquemática: qué debe mostrar la referencia "settlement".
       ZONA de mundo abierto: el pueblo Y su entorno (campos, borde de bosque).
       La imagen real es una pintura full-bleed sin texto. -->
  <rect width="1024" height="1024" fill="#6b8f3f"/>

  <!-- transición: campos labrados en el borde derecho -->
  <g>
    <rect x="800" y="60" width="200" height="150" fill="#8f7a52"/>
    <rect x="820" y="280" width="190" height="140" fill="#9c8557"/>
    <g stroke="#75603a" stroke-width="7">
      <line x1="810" y1="85" x2="990" y2="85"/><line x1="810" y1="115" x2="990" y2="115"/>
      <line x1="810" y1="145" x2="990" y2="145"/><line x1="810" y1="175" x2="990" y2="175"/>
      <line x1="830" y1="310" x2="1000" y2="310"/><line x1="830" y1="340" x2="1000" y2="340"/>
      <line x1="830" y1="370" x2="1000" y2="370"/><line x1="830" y1="400" x2="1000" y2="400"/>
    </g>
  </g>

  <!-- transición: borde de bosque abajo-izquierda (árbol = copa + tronco) -->
  <g>
    <rect x="52" y="770" width="16" height="42" fill="#5c3a26"/>
    <rect x="162" y="830" width="16" height="42" fill="#5c3a26"/>
    <g fill="#3d5a2c" stroke="#2c421f" stroke-width="5">
      <circle cx="70" cy="880" r="60"/><circle cx="180" cy="930" r="65"/>
      <circle cx="60" cy="740" r="52"/><circle cx="300" cy="960" r="55"/>
      <circle cx="170" cy="800" r="48"/>
    </g>
  </g>

  <!-- calles de TIERRA -->
  <path d="M -20 520 L 1044 480 L 1044 550 L -20 590 Z" fill="#8f7a52"/>
  <path d="M 460 -20 L 540 -20 L 560 500 L 480 520 Z" fill="#8f7a52"/>
  <path d="M 520 560 L 600 555 L 660 1044 L 570 1044 Z" fill="#8f7a52"/>

  <!-- plaza del mercado: empedrado SOLO aquí -->
  <ellipse cx="520" cy="530" rx="155" ry="112" fill="#a8a094"/>
  <g fill="none" stroke="#8d857a" stroke-width="4">
    <ellipse cx="520" cy="530" rx="110" ry="78"/>
    <ellipse cx="520" cy="530" rx="60" ry="42"/>
  </g>
  <rect x="452" y="478" width="56" height="38" fill="#b8945e" stroke="#6e5836" stroke-width="4"/>
  <rect x="548" y="548" width="56" height="38" fill="#b8945e" stroke="#6e5836" stroke-width="4"/>

  <!-- casas: tejado (dos faldones) + CARA SUR con puerta/ventana (~25% más
       oscura que la tapa — cenital con caras, nunca plano puro) -->
  <g stroke="#5c3a26" stroke-width="5">
    <g>
      <rect x="130" y="130" width="190" height="52" fill="#c26a48"/>
      <rect x="130" y="182" width="190" height="48" fill="#a4573b"/>
      <rect x="130" y="230" width="190" height="48" fill="#7c4a30"/>
      <rect x="205" y="242" width="34" height="36" fill="#4a3320" stroke-width="3"/>
      <rect x="150" y="242" width="26" height="20" fill="#38424c" stroke-width="3"/>
    </g>
    <g>
      <rect x="620" y="112" width="160" height="48" fill="#c26a48"/>
      <rect x="620" y="160" width="160" height="44" fill="#a4573b"/>
      <rect x="620" y="204" width="160" height="44" fill="#7c4a30"/>
      <rect x="682" y="216" width="32" height="32" fill="#4a3320" stroke-width="3"/>
    </g>
    <g>
      <rect x="170" y="620" width="170" height="48" fill="#c26a48"/>
      <rect x="170" y="668" width="170" height="44" fill="#a4573b"/>
      <rect x="170" y="712" width="170" height="44" fill="#7c4a30"/>
      <rect x="238" y="722" width="32" height="34" fill="#4a3320" stroke-width="3"/>
    </g>
    <g>
      <rect x="700" y="620" width="180" height="50" fill="#c26a48"/>
      <rect x="700" y="670" width="180" height="46" fill="#a4573b"/>
      <rect x="700" y="716" width="180" height="46" fill="#7c4a30"/>
      <rect x="772" y="726" width="34" height="36" fill="#4a3320" stroke-width="3"/>
      <rect x="726" y="726" width="26" height="20" fill="#38424c" stroke-width="3"/>
    </g>
  </g>

  <!-- huertos y vallas -->
  <g fill="#54793a" stroke="#3c5729" stroke-width="4">
    <rect x="130" y="320" width="115" height="85"/>
    <rect x="650" y="280" width="105" height="75"/>
  </g>
  <g stroke="#7da34c" stroke-width="6">
    <line x1="140" y1="345" x2="235" y2="345"/><line x1="140" y1="370" x2="235" y2="370"/>
    <line x1="140" y1="395" x2="235" y2="395"/>
    <line x1="660" y1="305" x2="745" y2="305"/><line x1="660" y1="330" x2="745" y2="330"/>
  </g>
  <path d="M 120 310 L 255 310 L 255 415 L 120 415 Z" fill="none" stroke="#6e5836" stroke-width="6"/>

  <!-- etiquetas de la plantilla -->
  <g fill="#ffffff" stroke="#00000099" stroke-width="5" paint-order="stroke"
     font-size="32" font-weight="bold">
    <text x="130" y="110">tejado + CARA SUR con puerta</text>
    <text x="400" y="425">empedrado SOLO en la plaza</text>
    <text x="60" y="500">calle de TIERRA</text>
    <text x="120" y="450" font-size="26">huerto y valla</text>
    <text x="740" y="470">transición a</text>
    <text x="740" y="506">campos labrados</text>
    <text x="340" y="850">transición a borde de bosque</text>
  </g>

  <!-- franja de reglas (solo en la plantilla) -->
  <rect y="874" width="1024" height="150" fill="#1e1e1e" opacity="0.88"/>
  <g fill="#ffffff">
    <text x="32" y="918" font-size="26" font-weight="bold">REFERENCIA «settlement» — pueblo y su entorno (categoría por defecto)</text>
    <text x="32" y="958" font-size="22">Cenital CON CARAS: los volúmenes pintan su cara sur · empedrado SOLO en la plaza</text>
    <text x="32" y="996" font-size="22" fill="#ffd27a">Escena completa full-bleed, varios elementos — nunca un sujeto aislado. Sin texto ni UI.</text>
  </g>
</svg>
