    <rect x="156" y="540" width="28" height="140" fill="#7a828c" rx="8"/>
    <rect x="196" y="540" width="28" height="140" fill="#7a828c" rx="8"/>
    <rect x="148" y="672" width="42" height="24" fill="#565c66" rx="6"/>
