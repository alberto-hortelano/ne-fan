<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024" font-family="sans-serif">
  <!-- Plantilla esquemática: "character_warrior" como MODEL SHEET —
       el MISMO personaje dibujado tres veces: frente, tres cuartos y espalda.
       Fondo neutro liso; las etiquetas son solo de la plantilla. -->
  <rect width="1024" height="1024" fill="#d8d2c4"/>

  <!-- guías de encuadre -->
  <g stroke="#b04a3a" stroke-width="3" stroke-dasharray="12 10" fill="none">
    <line x1="80" y1="256" x2="944" y2="256"/>
    <line x1="80" y1="724" x2="944" y2="724"/>
  </g>

  <!-- ======== VISTA FRONTAL (cx=190) ======== -->
  <g stroke="#33383f" stroke-width="5">
