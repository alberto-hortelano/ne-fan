  <g fill="#33383f">
    <circle cx="520" cy="322" r="4"/><circle cx="536" cy="320" r="4"/>
    <path d="M 546 330 l 6 4" stroke="#33383f" stroke-width="3"/>
  </g>

  <!-- ======== VISTA DE ESPALDA (cx=834) ======== -->
