    <ellipse cx="834" cy="712" rx="92" ry="16" fill="#00000022" stroke="none"/>
    <rect x="800" y="540" width="28" height="140" fill="#7a828c" rx="8"/>
    <rect x="838" y="540" width="28" height="140" fill="#7a828c" rx="8"/>
