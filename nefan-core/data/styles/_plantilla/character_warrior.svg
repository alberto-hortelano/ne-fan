    <path d="M 560 396 L 584 490 L 564 500 L 544 410 Z" fill="#98a1ac"/>
    <circle cx="450" cy="512" r="12" fill="#c9a281"/>
    <circle cx="574" cy="508" r="12" fill="#c9a281"/>
    <circle cx="512" cy="322" r="38" fill="#c9a281"/>
    <path d="M 474 318 A 40 40 0 0 1 550 318 L 550 300 A 40 30 0 0 0 474 300 Z" fill="#7a828c"/>
