    <ellipse cx="882" cy="382" rx="26" ry="18" fill="#7a828c"/>
    <path d="M 784 396 L 760 500 L 780 508 L 800 408 Z" fill="#8b95a1"/>
    <path d="M 884 396 L 908 500 L 888 508 L 868 408 Z" fill="#8b95a1"/>
    <circle cx="770" cy="516" r="12" fill="#c9a281"/>
    <circle cx="898" cy="516" r="12" fill="#c9a281"/>
    <circle cx="834" cy="322" r="38" fill="#c9a281"/>
    <path d="M 796 322 A 38 38 0 0 1 872 322 L 872 292 A 38 30 0 0 0 796 292 Z" fill="#7a828c"/>
    <path d="M 800 348 Q 834 372 868 348 L 868 322 L 800 322 Z" fill="#7a828c"/>
  </g>
  <!-- escudo colgado a la espalda + empuñadura sobre el hombro -->
  <path d="M 796 400 L 872 400 L 872 480 Q 834 522 796 480 Z"
        fill="#a4573b" stroke="#5c3a26" stroke-width="6"/>
  <circle cx="834" cy="440" r="10" fill="#d6a534"/>
  <g>
    <rect x="862" y="330" width="12" height="56" fill="#6e5836" transform="rotate(18 868 358)"/>
    <rect x="846" y="322" width="44" height="10" fill="#6e5836" transform="rotate(18 868 327)"/>
  </g>

  <!-- etiquetas de la plantilla -->
  <g fill="#333333" font-size="28" font-weight="bold" text-anchor="middle">
    <text x="190" y="775">frente</text>
    <text x="512" y="775">tres cuartos</text>
    <text x="834" y="775">espalda</text>
  </g>
  <g fill="#333333" font-size="26" font-weight="bold">
    <text x="80" y="230">MISMO personaje, misma altura en las tres vistas</text>
    <text x="80" y="830">armadura de época, arma y escudo visibles · fondo neutro liso</text>
  </g>

  <!-- franja de reglas (solo en la plantilla) -->
  <rect y="874" width="1024" height="150" fill="#1e1e1e" opacity="0.88"/>
  <g fill="#ffffff">
    <text x="32" y="918" font-size="26" font-weight="bold">REFERENCIA «character_warrior» — model sheet del guerrero</text>
    <text x="32" y="958" font-size="22">UN personaje, 3 vistas (frente · 3/4 · espalda) · cuerpo entero · fondo neutro liso</text>
    <text x="32" y="996" font-size="22" fill="#ffd27a">La imagen real NO lleva texto ni UI — las etiquetas son solo de la plantilla.</text>
  </g>
</svg>
