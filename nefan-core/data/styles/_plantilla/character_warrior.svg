    <path d="M 142 372 L 238 372 L 246 500 L 134 500 Z" fill="#98a1ac"/>
    <path d="M 138 500 L 242 500 L 248 544 L 132 544 Z" fill="#7a828c"/>
    <path d="M 190 378 L 190 496" stroke="#565c66" stroke-width="7" fill="none"/>
    <ellipse cx="142" cy="382" rx="26" ry="18" fill="#7a828c"/>
    <ellipse cx="238" cy="382" rx="26" ry="18" fill="#7a828c"/>
    <path d="M 140 396 L 116 500 L 136 508 L 156 408 Z" fill="#98a1ac"/>
    <path d="M 240 396 L 264 500 L 244 508 L 224 408 Z" fill="#98a1ac"/>
    <circle cx="126" cy="516" r="12" fill="#c9a281"/>
    <circle cx="254" cy="516" r="12" fill="#c9a281"/>
    <circle cx="190" cy="322" r="38" fill="#c9a281"/>
    <path d="M 152 318 A 40 40 0 0 1 228 318 L 228 300 A 40 30 0 0 0 152 300 Z" fill="#7a828c"/>
  </g>
  <g fill="#33383f">
    <circle cx="178" cy="322" r="4"/><circle cx="202" cy="322" r="4"/>
  </g>

  <!-- ======== VISTA TRES CUARTOS (cx=512) ======== -->
  <g stroke="#33383f" stroke-width="5">
    <ellipse cx="512" cy="712" rx="92" ry="16" fill="#00000022" stroke="none"/>
    <rect x="478" y="540" width="28" height="140" fill="#7a828c" rx="8"/>
    <rect x="516" y="540" width="28" height="140" fill="#7a828c" rx="8"/>
    <rect x="470" y="672" width="42" height="24" fill="#565c66" rx="6"/>
    <rect x="514" y="672" width="46" height="24" fill="#565c66" rx="6"/>
    <path d="M 466 372 L 558 372 L 570 500 L 456 500 Z" fill="#98a1ac"/>
    <path d="M 460 500 L 566 500 L 572 544 L 454 544 Z" fill="#7a828c"/>
    <ellipse cx="466" cy="382" rx="26" ry="18" fill="#7a828c"/>
    <ellipse cx="558" cy="382" rx="26" ry="18" fill="#7a828c"/>
    <path d="M 462 396 L 440 496 L 460 504 L 478 408 Z" fill="#98a1ac"/>
